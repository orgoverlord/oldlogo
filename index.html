<!DOCTYPE html>
<html>
<head>
<title>OVERLORD PARTICLE AI</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#title{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:30px;
letter-spacing:4px;
}

#info{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:14px;
opacity:0.8;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

</head>

<body>

<div id="title">OVERLORD ESPORTS</div>
<div id="info">Move hand to rotate • Pinch to expand</div>

<video id="webcam" autoplay playsinline style="display:none"></video>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 120

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

let particleCount = 3000

let geometry = new THREE.BufferGeometry()

let positions = new Float32Array(particleCount*3)

for(let i=0;i<particleCount;i++){

positions[i*3]=(Math.random()-0.5)*200
positions[i*3+1]=(Math.random()-0.5)*200
positions[i*3+2]=(Math.random()-0.5)*200

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

let material = new THREE.PointsMaterial({
size:1.5,
color:0x00ffff,
transparent:true
})

let particles = new THREE.Points(geometry,material)

scene.add(particles)

function animate(){

requestAnimationFrame(animate)

particles.rotation.y+=0.001

renderer.render(scene,camera)

}

animate()

let videoElement = document.getElementById("webcam")

function onResults(results){

if(results.multiHandLandmarks){

let hand = results.multiHandLandmarks[0]

let x = hand[9].x
let y = hand[9].y

particles.rotation.y=(x-0.5)*6
particles.rotation.x=(y-0.5)*6

let thumb = hand[4]
let index = hand[8]

let dx = thumb.x-index.x
let dy = thumb.y-index.y

let distance = Math.sqrt(dx*dx+dy*dy)

particles.scale.set(
1+distance*4,
1+distance*4,
1+distance*4
)

}

}

let hands = new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(onResults)

const cameraUtils = new Camera(videoElement,{
onFrame:async()=>{
await hands.send({image:videoElement})
},
width:640,
height:480
})

cameraUtils.start()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
