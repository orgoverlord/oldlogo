<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barri game</title>
<style>
    body {
        margin: 0;
        background: gray;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        font-family: 'Arial', sans-serif;
    }

    canvas { display: block; }

    #menu, #gameover {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        padding: 20px;
        z-index: 10;
    }

    button {
        padding: 15px 40px;
        font-size: 22px;
        border: none;
        border-radius: 12px;
        background: #ffffff22;
        color: white;
        margin-top: 20px;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 0 10px #fff5;
    }

    button:hover {
        background: #ffffff33;
        transform: scale(1.05);
    }

    #hud {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        font-size: 22px;
        z-index: 5;
        text-shadow: 1px 1px 4px #000;
    }

    #hearts {
        position: absolute;
        top: 15px;
        right: 15px;
        color: white;
        font-size: 28px;
        z-index: 5;
        text-shadow: 1px 1px 4px #000;
    }

    #combo {
        position: absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 30px;
        color: gold;
        text-shadow: 2px 2px 6px #000;
        z-index: 6;
    }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">Score: 0</div>
<div id="hearts">😎😎😎</div>
<div id="combo" style="display:none;">Combo!</div>

<div id="menu">
    <h1>Cut Swipe</h1>
    <p style="max-width: 300px;">
        Make the highest score!<br>
       😅
    </p>
    <button onclick="startGame()">Play</button>
</div>

<div id="gameover" style="display:none;">
    <h1>GAME OVER</h1>
    <h2 id="scoreText"></h2>
    <button onclick="startGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
resizeCanvas();

let objects = [];
let particles = [];
let swipeTrail = [];

let score = 0;
let lives = 3;
let difficulty = 1;
let lastSpawn = 0;
let gameRunning = false;
let comboCount = 0;
let lastCutTime = 0;

const goodColors = ["cyan", "yellow", "white", "lime", "magenta", "red"];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resizeCanvas;

function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameover").style.display = "none";

    objects = [];
    particles = [];
    swipeTrail = [];
    score = 0;
    lives = 3;
    difficulty = 1;
    lastSpawn = 0;
    comboCount = 0;
    lastCutTime = 0;
    gameRunning = true;

    updateHUD();
    loop();
}

function updateHUD() {
    document.getElementById("hud").innerText = "Score: " + score;
    document.getElementById("hearts").innerText = "❤️".repeat(lives);
}

function spawnObject() {
    const size = 70;
    const x = Math.random() * (canvas.width - size);
    const y = canvas.height + size;

    const color = goodColors[Math.floor(Math.random() * goodColors.length)];

    objects.push({
        x, y,
        size,
        color,
        speed: 2 + difficulty
    });
}

function createParticles(x, y, color) {
    for (let i = 0; i < 20; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: 4 + Math.random() * 4,
            color,
            life: 25 + Math.random() * 15
        });
    }
}

canvas.addEventListener("touchmove", e => {
    const touch = e.touches[0];
    swipeTrail.push({ x: touch.clientX, y: touch.clientY, life: 10 });
    checkCut(touch.clientX, touch.clientY);
});

canvas.addEventListener("touchstart", e => {
    const t = e.touches[0];
    swipeTrail.push({ x: t.clientX, y: t.clientY, life: 10 });
});

function checkCut(x, y) {
    let cutThisFrame = false;

    objects.forEach((obj, i) => {
        if (
            x > obj.x &&
            x < obj.x + obj.size &&
            y > obj.y &&
            y < obj.y + obj.size
        ) {
            createParticles(obj.x + obj.size/2, obj.y + obj.size/2, obj.color);

            score++;
            difficulty += 0.05;
            cutThisFrame = true;

            objects.splice(i, 1);
        }
    });

    const now = performance.now();
    if (cutThisFrame && now - lastCutTime < 400) {
        comboCount++;
        if (comboCount >= 2) {
            document.getElementById("combo").style.display = "block";
            setTimeout(() => document.getElementById("combo").style.display = "none", 300);
        }
    } else {
        comboCount = 0;
    }
    lastCutTime = now;

    updateHUD();
}

function loop(timestamp) {
    if (!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // spawn objects
    if (!lastSpawn || timestamp - lastSpawn > Math.max(300, 700 - difficulty * 40)) {
        spawnObject();
        lastSpawn = timestamp;
    }

    // move and draw objects
    for (let i = 0; i < objects.length; i++) {
        const obj = objects[i];
        obj.y -= obj.speed;

        if (obj.y + obj.size < 0) {
            lives--;
            updateHUD();
            objects.splice(i, 1);

            if (lives <= 0) {
                endGame();
                return;
            }

            i--;
            continue;
        }

        ctx.fillStyle = obj.color;
        ctx.beginPath();
        ctx.arc(obj.x + obj.size/2, obj.y + obj.size/2, obj.size/2, 0, Math.PI*2);
        ctx.fill();
    }

    // draw swipe trail
    swipeTrail.forEach((p, i) => {
        ctx.fillStyle = "rgba(255,255,255," + p.life / 10 + ")";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 25 * (p.life / 10), 0, Math.PI * 2);
        ctx.fill();

        p.life -= 0.5;
        if (p.life <= 0) swipeTrail.splice(i, 1);
    });

    // draw particles
    particles.forEach((p, i) => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(loop);
}

function endGame() {
    gameRunning = false;
    document.getElementById("gameover").style.display = "flex";
    document.getElementById("scoreText").innerText = "Final Score: " + score;
}
</script>
</body>
</html>
