<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Gesture Particle Universe</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#webcam{
position:absolute;
top:10px;
left:10px;
width:160px;
border:2px solid white;
border-radius:8px;
}

#ui{
position:absolute;
top:10px;
left:190px;
color:white;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

</head>

<body>

<video id="webcam" autoplay playsinline></video>

<div id="ui">
<h3>Gesture Particle System</h3>
<p>Pinch = Zoom</p>
<p>Move Hand = Rotate / Tilt</p>
<p>Pinch Release = Change Shape</p>
<p>Shape: <span id="shape-name">SPHERE</span></p>
</div>

<script>

/* THREE SCENE */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=120

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)



/* PARTICLES */

const particleCount=5000

const geometry=new THREE.BufferGeometry()

const positions=new Float32Array(particleCount*3)
const colors=new Float32Array(particleCount*3)



const shapes={
sphere:[],
heart:[],
saturn:[],
volcano:[],
cloud:[],
mountain:[],
lightning:[],
fish:[],
dog:[],
star:[],
pyramid:[],
skull:[],
bike:[],
ship:[],
ufo:[],
dna:[]
}



const shapeNames=Object.keys(shapes)
let currentShapeIndex=0



for(let i=0;i<particleCount;i++){

/* SPHERE */

const phi=Math.acos(-1+(2*i)/particleCount)
const theta=Math.sqrt(particleCount*Math.PI)*phi

shapes.sphere.push(
30*Math.cos(theta)*Math.sin(phi),
30*Math.sin(theta)*Math.sin(phi),
30*Math.cos(phi)
)



/* HEART */

const t=i*0.1
const r=2

const x=r*16*Math.pow(Math.sin(t),3)
const y=r*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
const z=(Math.random()-0.5)*10

shapes.heart.push(x,y,z)



/* SATURN */

if(i<particleCount*0.3){

const p=Math.acos(-1+(2*(i/0.3))/particleCount)
const tt=Math.sqrt(particleCount*0.3*Math.PI)*p

shapes.saturn.push(
15*Math.cos(tt)*Math.sin(p),
15*Math.sin(tt)*Math.sin(p),
15*Math.cos(p)
)

}else{

const angle=Math.random()*Math.PI*2
const radius=22+Math.random()*15

shapes.saturn.push(
radius*Math.cos(angle),
(Math.random()-0.5)*2,
radius*Math.sin(angle)
)

}



/* VOLCANO */

shapes.volcano.push(
(Math.random()-0.5)*20,
Math.random()*30-15,
(Math.random()-0.5)*20
)



/* CLOUD */

shapes.cloud.push(
(Math.random()-0.5)*40,
(Math.random()-0.5)*10,
(Math.random()-0.5)*20
)



/* MOUNTAIN */

shapes.mountain.push(
(Math.random()-0.5)*30,
Math.abs(Math.random()*30),
(Math.random()-0.5)*30
)



/* LIGHTNING */

shapes.lightning.push(
(Math.random()-0.5)*5,
30-i*0.01,
(Math.random()-0.5)*5
)



/* FISH */

const angle=Math.random()*Math.PI*2

shapes.fish.push(
Math.cos(angle)*20,
Math.sin(angle)*8,
(Math.random()-0.5)*10
)



/* DOG */

shapes.dog.push(
(Math.random()-0.5)*25,
(Math.random()-0.5)*15,
(Math.random()-0.5)*10
)



/* STAR */

const starAngle=Math.random()*Math.PI*2
const starRadius=20*(Math.random()<0.5?1:0.4)

shapes.star.push(
Math.cos(starAngle)*starRadius,
Math.sin(starAngle)*starRadius,
(Math.random()-0.5)*5
)



/* PYRAMID */

shapes.pyramid.push(
(Math.random()-0.5)*30,
Math.random()*30,
(Math.random()-0.5)*30
)



/* SKULL */

shapes.skull.push(
(Math.random()-0.5)*20,
Math.random()*25-5,
(Math.random()-0.5)*20
)



/* BIKE */

shapes.bike.push(
(Math.random()-0.5)*35,
(Math.random()-0.5)*10,
(Math.random()-0.5)*5
)



/* SHIP */

shapes.ship.push(
(Math.random()-0.5)*40,
(Math.random()-0.5)*5,
(Math.random()-0.5)*15
)



/* UFO */

const a=Math.random()*Math.PI*2
const rad=20

shapes.ufo.push(
Math.cos(a)*rad,
(Math.random()-0.5)*3,
Math.sin(a)*rad
)



/* DNA HELIX */

const dnaT=i*0.05

shapes.dna.push(
Math.cos(dnaT)*20,
i*0.02-30,
Math.sin(dnaT)*20
)



positions[i*3]=shapes.sphere[i*3]
positions[i*3+1]=shapes.sphere[i*3+1]
positions[i*3+2]=shapes.sphere[i*3+2]

colors[i*3]=1
colors[i*3+1]=1
colors[i*3+2]=1

}



geometry.setAttribute("position",new THREE.BufferAttribute(positions,3))
geometry.setAttribute("color",new THREE.BufferAttribute(colors,3))



const material=new THREE.PointsMaterial({
size:1.5,
vertexColors:true,
blending:THREE.AdditiveBlending,
transparent:true,
opacity:0.9,
depthWrite:false
})



const particles=new THREE.Points(geometry,material)
scene.add(particles)



/* INTERACTION */

let targetScale=1
let currentScale=1
let baseColor=new THREE.Color(0x00ffff)
let isPinched=false



/* HAND TRACKING */

const videoElement=document.getElementById("webcam")

function onResults(results){

if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){

const landmarks=results.multiHandLandmarks[0]

const thumb=landmarks[4]
const index=landmarks[8]

const dx=thumb.x-index.x
const dy=thumb.y-index.y

const distance=Math.sqrt(dx*dx+dy*dy)

targetScale=Math.max(0.2,Math.min(distance*10,3))

baseColor.setHSL(distance*3,1,0.6)



/* ROTATION + TILT */

const handX=landmarks[9].x
const handY=landmarks[9].y

particles.rotation.y=(handX-0.5)*4
particles.rotation.x=(handY-0.5)*4



if(distance<0.04 && !isPinched){

isPinched=true

}else if(distance>0.06 && isPinched){

isPinched=false

currentShapeIndex=(currentShapeIndex+1)%shapeNames.length

document.getElementById("shape-name").innerText=
shapeNames[currentShapeIndex].toUpperCase()

}

}

}



const hands=new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
})

hands.onResults(onResults)



const cam=new Camera(videoElement,{
onFrame:async()=>{
await hands.send({image:videoElement})
},
width:640,
height:480
})

cam.start()



/* ANIMATION */

const clock=new THREE.Clock()

function animate(){

requestAnimationFrame(animate)

const time=clock.getElapsedTime()

currentScale+=(targetScale-currentScale)*0.1

const pos=geometry.attributes.position
const col=geometry.attributes.color

const targetShape=shapes[shapeNames[currentShapeIndex]]

for(let i=0;i<particleCount;i++){

const tx=targetShape[i*3]*currentScale
const ty=targetShape[i*3+1]*currentScale
const tz=targetShape[i*3+2]*currentScale

pos.array[i*3]+= (tx-pos.array[i*3])*0.05
pos.array[i*3+1]+= (ty-pos.array[i*3+1])*0.05
pos.array[i*3+2]+= (tz-pos.array[i*3+2])*0.05

pos.array[i*3]+=Math.sin(time+i)*0.05
pos.array[i*3+1]+=Math.cos(time+i)*0.05



const c=new THREE.Color().copy(baseColor).offsetHSL(i/particleCount*0.2,0,0)

col.array[i*3]=c.r
col.array[i*3+1]=c.g
col.array[i*3+2]=c.b

}

pos.needsUpdate=true
col.needsUpdate=true

renderer.render(scene,camera)

}

animate()



window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
